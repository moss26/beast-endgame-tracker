<!DOCTYPE html>
<html>
<head>
    <title>MrBeast Puzzle Endgame Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" />
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f4f4f4; }
        #map { height: 600px; width: 100%; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .container { background: white; padding: 30px; border-radius: 10px; }
        h1 { color: #2d3436; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌍 Million Dollar Puzzle: Boat Itinerary</h1>
    <p>Lines represent the "Stick In-Between" path from the riddle.</p>
    <div id="map"></div>

    <h1>📊 91-Row Master Data</h1>
    <table id="locationTable" class="display" style="width:100%">
        <thead>
            <tr>
                <th>Step</th><th>Stage</th><th>City</th><th>First</th><th>Last</th><th>Caption</th><th>Lat</th><th>Long</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
    // 1. Initialize Map WITH REPEAT DISABLED
    const map = L.map('map', {
        worldCopyJump: false, // Prevents jumping between copies of the world
        maxBounds: [[-90, -180], [90, 180]], // Limits the map to one world view
        maxBoundsViscosity: 1.0 
    }).setView([20, 0], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        noWrap: true, // THIS STOPS THE REPEATING WORLD
        bounds: [[-90, -180], [90, 180]]
    }).addTo(map);

    // 2. Load Data (Double check your filename here!)
    const csvUrl = 'Enriched_MrBeast_Locations.csv'; 

    Papa.parse(csvUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const data = results.data;
            const tableBody = $('#locationTable tbody');
            let pathCoords = [];

            data.forEach((row, index) => {
                if (row.City && row.Latitude && row.Longitude) {
                    tableBody.append(`
                        <tr>
                            <td>${index + 1}</td>
                            <td>${row.Stage || ''}</td>
                            <td>${row.City}</td>
                            <td><b>${row.First || ''}</b></td>
                            <td><b>${row.Last || ''}</b></td>
                            <td>${row.Caption || ''}</td>
                            <td>${row.Latitude}</td>
                            <td>${row.Longitude}</td>
                        </tr>
                    `);

                    const lat = parseFloat(row.Latitude);
                    const lng = parseFloat(row.Longitude);
                    const dotColor = row.Stage === 'Stage 1' ? '#0984e3' : '#d63031';
                    
                    L.circleMarker([lat, lng], {
                        color: dotColor,
                        fillOpacity: 0.8,
                        radius: 4 // Smaller dots
                    }).addTo(map).bindPopup(`<b>${row.City}</b><br>${row.Caption || ''}`);

                    pathCoords.push([lat, lng]);
                }
            });

            // 3. THIN, CLEAN LINES
            // Connecting the dots to reveal the word
            L.polyline(pathCoords, {
                color: '#636e72', 
                weight: 1.5, // MUCH THINNER LINE
                opacity: 0.5,
                smoothFactor: 1
            }).addTo(map);

            $('#locationTable').DataTable({ "pageLength": 25 });
        }
    });
</script>
</body>
</html>
